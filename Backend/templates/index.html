<!DOCTYPE html>
<html>

<head>
    <title>Expense Tracker</title>

    <style>
        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        button{
            padding:8px 15px;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>

<body>

<h1>Expense Tracker</h1>

<a href="http://127.0.0.1:8000/api/add-expense/">
    <button>+ Add Expense</button>
</a>

<br><br>

<table>

<tr>

<th>ID</th>
<th>Title</th>
<th>Amount</th>
<th>Description</th>
<th>Date</th>
<th>Edit</th>
<th>Delete</th>

</tr>

{% for expense in expenses %}

<tr>

<td>{{expense.id}}</td>
<td>{{expense.title}}</td>
<td>{{expense.amount}}</td>
<td>{{expense.description}}</td>
<td>{{expense.date}}</td>

<td>

<a href="http://127.0.0.1:8000/api/edit-expense/{{expense.id}}/">
<button>Edit</button>
</a>

</td>

<td>

<form method="POST"
action="http://127.0.0.1:8000/api/expense/delete/{{expense.id}}/">

{% csrf_token %}

<input
type="submit"
value="Delete">

</form>

</td>

</tr>

{% empty %}

<tr>

<td colspan="7">

No Expenses Found

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
