<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Edit Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

    <h2>Edit Expense</h2>

    <form method="POST" action="http://127.0.0.1:8000/api/expense/update/{{ expense.id }}/">

        {% csrf_token %}

        <label>Title:</label><br>
        <input
            type="text"
            name="title"
            value="{{ expense.title }}"
            required>

        <br><br>

        <label>Amount:</label><br>
        <input
            type="number"
            name="amount"
            value="{{ expense.amount }}"
            required>

        <br><br>

        <label>Description:</label><br>
        <textarea
            name="description"
            rows="5"
            cols="30">{{ expense.description }}</textarea>

        <br><br>

        <label>Date:</label><br>
        <input
            type="date"
            name="date"
            value="{{ expense.date|date:'Y-m-d' }}"
            required>

        <br><br>

        <input
            type="submit"
            value="Update Expense">

        <a href="http://127.0.0.1:8000/api/">
            <button type="button">Cancel</button>
        </a>

    </form>

</body>

</html>
